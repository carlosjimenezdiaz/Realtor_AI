name: Daily Realty Report

on:
  schedule:
    - cron: '0 13 * * 1-5'  # Mon-Fri 8:00 AM EST (13:00 UTC) / 9:00 AM EDT
  workflow_dispatch:
    inputs:
      state_name:
        description: 'Full state name — leave blank to use repo variable (e.g. Florida)'
        required: false
        default: ''
      state_abbreviation:
        description: 'State abbreviation — leave blank to use repo variable (e.g. FL)'
        required: false
        default: ''
      cities:
        description: 'Comma-separated cities — leave blank to use repo variable'
        required: false
        default: ''
      newsletter_name:
        description: 'Newsletter name — leave blank to use repo variable'
        required: false
        default: ''
      timezone:
        description: 'IANA timezone — leave blank to use repo variable'
        required: false
        default: ''
      state_realtors_url:
        description: 'State realtors association URL (optional)'
        required: false
        default: ''
      telegram_chat_id:
        description: 'Telegram chat ID — leave blank to use repo variable'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run pipeline
        env:
          # All LLM calls (Claude + Perplexity sonar) go through OpenRouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # inputs override repo vars — leave inputs blank to use default state (Florida)
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id || vars.TELEGRAM_CHAT_ID }}
          STATE_NAME: ${{ inputs.state_name || vars.STATE_NAME }}
          STATE_ABBREVIATION: ${{ inputs.state_abbreviation || vars.STATE_ABBREVIATION }}
          CITIES: ${{ inputs.cities || vars.CITIES }}
          TIMEZONE: ${{ inputs.timezone || vars.TIMEZONE }}
          NEWSLETTER_NAME: ${{ inputs.newsletter_name || vars.NEWSLETTER_NAME }}
          STATE_REALTORS_URL: ${{ inputs.state_realtors_url || vars.STATE_REALTORS_URL }}
          # Dedup file is state-scoped to avoid collisions between parallel runs
          DEDUP_HISTORY_FILE: data/seen_articles_${{ inputs.state_abbreviation || vars.STATE_ABBREVIATION }}.json
        run: python main.py

      - name: Persist deduplication state
        if: always()
        uses: ./.github/actions/persist-state
        with:
          state_abbreviation: ${{ inputs.state_abbreviation || vars.STATE_ABBREVIATION }}
