name: Daily Realty Report

on:
  schedule:
    - cron: '0 13 * * 1-5'  # Mon-Fri 8:00 AM EST (13:00 UTC) / 9:00 AM EDT
  workflow_dispatch:
    inputs:
      state_name:
        description: 'Full state name (e.g. California)'
        required: true
        default: ''
      state_abbreviation:
        description: 'State abbreviation (e.g. CA)'
        required: true
        default: ''
      cities:
        description: 'Comma-separated cities (e.g. Los Angeles,San Francisco,San Diego)'
        required: true
        default: ''
      newsletter_name:
        description: 'Newsletter name (e.g. California Realty Intel)'
        required: true
        default: ''
      timezone:
        description: 'IANA timezone (e.g. America/Los_Angeles)'
        required: false
        default: 'America/New_York'
      state_realtors_url:
        description: 'State realtors association URL (optional)'
        required: false
        default: ''
      telegram_chat_id:
        description: 'Telegram chat/channel ID for this state'
        required: true
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run pipeline
        env:
          # API Keys — Settings → Secrets and variables → Actions → Secrets
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # inputs override vars — manual runs use inputs, cron uses vars
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id || vars.TELEGRAM_CHAT_ID }}
          STATE_NAME: ${{ inputs.state_name || vars.STATE_NAME }}
          STATE_ABBREVIATION: ${{ inputs.state_abbreviation || vars.STATE_ABBREVIATION }}
          CITIES: ${{ inputs.cities || vars.CITIES }}
          TIMEZONE: ${{ inputs.timezone || vars.TIMEZONE }}
          NEWSLETTER_NAME: ${{ inputs.newsletter_name || vars.NEWSLETTER_NAME }}
          STATE_REALTORS_URL: ${{ inputs.state_realtors_url || vars.STATE_REALTORS_URL }}
          # Dedup file is state-scoped to avoid collisions between parallel runs
          DEDUP_HISTORY_FILE: data/seen_articles_${{ inputs.state_abbreviation || vars.STATE_ABBREVIATION }}.json
        run: python main.py

      - name: Persist deduplication state
        if: always()
        uses: ./.github/actions/persist-state
        with:
          state_abbreviation: ${{ inputs.state_abbreviation || vars.STATE_ABBREVIATION }}
