name: Florida — Daily Realty Report

on:
  schedule:
    - cron: '0 13 * * 1-5'  # Mon-Fri 8:00 AM EST (13:00 UTC) / 9:00 AM EDT
  workflow_dispatch:          # Sin inputs — dispara directo sin rellenar nada

jobs:
  run:
    uses: ./.github/workflows/_pipeline.yml
    with:
      state_name: Florida
      state_abbreviation: FL
      cities: Miami,Orlando,Tampa,Jacksonville,Fort Lauderdale
      timezone: America/New_York
      newsletter_name: Florida Realty Intel
      state_realtors_url: https://www.floridarealtors.org/news-media/news-articles/rss
    secrets:
      openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      firecrawl_api_key: ${{ secrets.FIRECRAWL_API_KEY }}
      telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      telegram_chat_id: ${{ secrets.FL_TELEGRAM_CHAT_ID }}
