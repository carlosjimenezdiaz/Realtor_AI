name: Texas — Daily Realty Report

on:
  schedule:
    - cron: '0 14 * * 1-5'  # Mon-Fri 8:00 AM CST (14:00 UTC) / 9:00 AM CDT
  workflow_dispatch:          # Sin inputs — dispara directo sin rellenar nada

jobs:
  run:
    uses: ./.github/workflows/_pipeline.yml
    with:
      state_name: Texas
      state_abbreviation: TX
      cities: Houston,Dallas,Austin,San Antonio,Fort Worth
      timezone: America/Chicago
      newsletter_name: Texas Realty Intel
      state_realtors_url: ''
    secrets:
      openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      firecrawl_api_key: ${{ secrets.FIRECRAWL_API_KEY }}
      telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      telegram_chat_id: ${{ secrets.TX_TELEGRAM_CHAT_ID }}
