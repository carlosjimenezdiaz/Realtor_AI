name: Persist Deduplication State
description: Commits updated seen_articles_*.json files back to the repo for cross-run deduplication

inputs:
  state_abbreviation:
    description: 'State abbreviation used in the dedup filename (e.g. FL, CA)'
    required: true

runs:
  using: composite
  steps:
    - name: Commit dedup state
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/seen_articles_*.json
        git diff --staged --quiet || (
          git commit -m "chore: update dedup state [${{ inputs.state_abbreviation }}] [skip ci]" &&
          git push
        )
